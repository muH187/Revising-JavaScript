<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    h1 {
        font-size: 3em;
    }
    .bulb {
        height: 20em;
        width: 20em;
        border-radius: 50%;
        margin: 20px;
        border: 4px solid black;
    }
    .buttonON {
        padding: 10px 35px;
        border-radius: 20px;
        border: 2px solid black;
        background-color: green;
        color: white;
        font-size: 1.2em;
        font-weight: bold;
        cursor: pointer;
    }
    .buttonOFF {
        padding: 10px 35px;
        margin-left: 20px;
        border-radius: 20px;
        border: 2px solid black;
        background-color: red;
        color: white;
        font-size: 1.2em;
        font-weight: bold;
        cursor: pointer;
    }
    .buttonOnOff{
        padding: 10px 35px;
        margin-left: 20px;
        border-radius: 20px;
        border: 2px solid black;
        background-color: yellow;
        color: black;
        font-size: 1.2em;
        font-weight: bold;
        cursor: pointer;
    }
</style>
<body>
    <h1>DOM Tutorial</h1>

    <div class="bulb">

    </div>
    <button class="buttonON">ON</button>
    <button class="buttonOFF">OFF</button>
    <button class="buttonOnOff">Click</button>

    <script src="DOM.js"></script>
</body>
</html>
